<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <link rel="icon" href="./google.png">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1 class="top">&starf;&nbsp;Search Engine Simple Project :-</h1>
    <div class="frame">
        <form action="https://www.google.com/search?">
            <h1>Google :-</h1>
            <div class="go-sec">
                <label for="go"></label>
                <input type="text" id="go" class="search-input" name="q" placeholder="search in google">
                <button type="submit" class="go-button">Search</button>
            </div>
        </form>
        
         <form action="https://www.youtube.com/results?">
            <h1 class="y">Youtube :-</h1>
            <div class="you-sec">
                <label for="you"></label>
                <input type="text" id="you" class="search-input" name="search_query" placeholder="search videos in youtube">
                <button type="submit" class="you-button">Search</button>
            </div>
        </form>
    </div>
</body>
</html>
